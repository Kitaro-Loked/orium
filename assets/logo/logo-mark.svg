<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="mCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%"-color="#4338CA"/>
    </radialGradient>
    <filter id="mGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="32" cy="32" r="30" fill="url(#mGrad)"/>
  
  <!-- 轨道 -->
  <ellipse cx="32" cy="32" rx="22" ry="22" fill="none" stroke="rgba(99,102,241,0.4)" stroke-width="1" transform="rotate(-15 32 32)"/>
  <ellipse cx="32" cy="32" rx="16" ry="16" fill="none" stroke="rgba(129,140,248,0.5)" stroke-width="0.8" transform="rotate(30 32 32)"/>
  
  <!-- 节点 -->
  <circle cx="32" cy="10" r="2.5" fill="#818CF8" filter="url(#mGlow)" transform="rotate(-15 32 32)"/>
  <circle cx="32" cy="16" r="2" fill="#A5B4FC" filter="url(#mGlow)" transform="rotate(30 32 32)"/>
  
  <!-- 核心六边形 -->
  <polygon points="32,20 40,25 40,34 32,39 24,34 24,25" fill="url(#mCore)" filter="url(#mGlow)"/>
  <circle cx="32" cy="29.5" r="2" fill="#FFFFFF" filter="url(#mGlow)"/>
</svg>
