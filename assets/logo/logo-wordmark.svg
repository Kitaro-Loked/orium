<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="wCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </radialGradient>
    <filter id="wGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Mark -->
  <g transform="translate(8, 8)">
    <circle cx="32" cy="32" r="30" fill="url(#wGrad)"/>
    <ellipse cx="32" cy="32" rx="22" ry="22" fill="none" stroke="rgba(99,102,241,0.4)" stroke-width="1" transform="rotate(-15 32 32)"/>
    <ellipse cx="32" cy="32" rx="16" ry="16" fill="none" stroke="rgba(129,140,248,0.5)" stroke-width="0.8" transform="rotate(30 32 32)"/>
    <circle cx="32" cy="10" r="2.5" fill="#818CF8" filter="url(#wGlow)" transform="rotate(-15 32 32)"/>
    <circle cx="32" cy="16" r="2" fill="#A5B4FC" filter="url(#wGlow)" transform="rotate(30 32 32)"/>
    <polygon points="32,20 40,25 40,34 32,39 24,34 24,25" fill="url(#wCore)" filter="url(#wGlow)"/>
    <circle cx="32" cy="29.5" r="2" fill="#FFFFFF" filter="url(#wGlow)"/>
  </g>
  
  <!-- Wordmark: Orium -->
  <text x="90" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="42" font-weight="700" fill="#0A2540" letter-spacing="-1">
    Orium
  </text>
  
  <!-- Tagline -->
  <text x="92" y="68" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="11" font-weight="400" fill="#6366F1" letter-spacing="2" opacity="0.8">
    THE ELEMENT OF INTELLIGENCE
  </text>
</svg>
