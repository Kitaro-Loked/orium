version: 0.1.0
runtime:
  mode: hybrid
  workers: 4
  timeout: 30000
adapters:
  kimi:
    enabled: true
    type: moonshot
    base_url: https://api.moonshot.cn/v1
    api_key: ${KIMI_API_KEY}
    models:
      - kimi-latest
      - kimi-k2
      - kimi-k1.5
    default: true
routing:
  strategy: fastest
  failover: true
  maxRetries: 3
tokenPools: {}
memory:
  workingCapacity: 7
  shortTermCapacity: 100
  longTermBackend: sqlite
tools:
  mcpEnabled: true
  allowedTools:
    - '*'
logging:
  level: info
  format: pretty
