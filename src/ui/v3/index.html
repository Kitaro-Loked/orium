<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orium Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .status {
      font-size: 12px;
      color: #8e8e93;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #34c759;
    }
    .status-dot.disconnected { background: #ff3b30; }
    .status-dot.connecting { background: #ff9500; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #007aff;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid #e5e5ea;
      border-bottom-left-radius: 4px;
    }
    .message.system {
      align-self: center;
      background: #fff3cd;
      color: #856404;
      font-size: 13px;
      padding: 8px 14px;
    }
    .message .time {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .typing {
      align-self: flex-start;
      background: white;
      border: 1px solid #e5e5ea;
      border-radius: 18px;
      padding: 16px 20px;
      display: none;
      gap: 4px;
    }
    .typing.show { display: flex; }
    .typing span {
      width: 8px; height: 8px;
      background: #007aff;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .input-area {
      background: white;
      border-top: 1px solid #e5e5ea;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      border: 1px solid #e5e5ea;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      outline: none;
      font-family: inherit;
    }
    .input-area textarea:focus { border-color: #007aff; }
    .input-area button {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: #007aff;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-area button:disabled { background: #c7c7cc; cursor: not-allowed; }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: #8e8e93;
    }
    .welcome h2 { font-size: 28px; color: #1d1d1f; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Orium Chat</h1>
    <div class="status">
      <span class="status-dot disconnected" id="connDot"></span>
      <span id="connText">Disconnected</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Orium</h2>
      <p>Start a conversation with your AI assistant</p>
    </div>
  </div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const wsUrl = 'ws://' + location.hostname + ':3001';
    let ws = null;
    let connected = false;
    let isTyping = false;
    let msgId = 0;

    const $ = id => document.getElementById(id);
    const messages = $('messages');
    const welcome = $('welcome');
    const typing = $('typing');
    const input = $('input');
    const sendBtn = $('sendBtn');
    const connDot = $('connDot');
    const connText = $('connText');

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        connected = true;
        connDot.className = 'status-dot';
        connText.textContent = 'Connected';
        ws.send(JSON.stringify({ type: 'init', adapter: 'kimi', model: 'moonshot-v1-8k' }));
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
      };
      ws.onclose = () => {
        connected = false;
        connDot.className = 'status-dot disconnected';
        connText.textContent = 'Disconnected';
        setTimeout(connect, 3000);
      };
      ws.onerror = () => {
        connDot.className = 'status-dot disconnected';
        connText.textContent = 'Error';
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'response':
          hideTyping();
          addMessage('assistant', msg.content);
          isTyping = false;
          break;
        case 'stream_start':
          showTyping();
          break;
        case 'stream_chunk':
          showTyping();
          appendStream(msg.chunk);
          break;
        case 'stream_end':
          hideTyping();
          isTyping = false;
          break;
        case 'error':
          hideTyping();
          addMessage('system', 'Error: ' + msg.error);
          isTyping = false;
          break;
      }
      updateSendButton();
    }

    function addMessage(role, content) {
      welcome.style.display = 'none';
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = escapeHtml(content) + '<div class="time">' + formatTime() + '</div>';
      messages.appendChild(div);
      scrollToBottom();
    }

    let currentStreamMsg = null;

    function appendStream(chunk) {
      welcome.style.display = 'none';
      if (!currentStreamMsg) {
        currentStreamMsg = document.createElement('div');
        currentStreamMsg.className = 'message assistant';
        currentStreamMsg.innerHTML = '<div class="time">' + formatTime() + '</div>';
        messages.appendChild(currentStreamMsg);
      }
      const textNode = document.createTextNode(chunk);
      currentStreamMsg.insertBefore(textNode, currentStreamMsg.lastElementChild);
      scrollToBottom();
    }

    function showTyping() {
      typing.classList.add('show');
      scrollToBottom();
    }

    function hideTyping() {
      typing.classList.remove('show');
      currentStreamMsg = null;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text || isTyping || !connected) return;

      addMessage('user', text);
      input.value = '';
      input.rows = 1;
      isTyping = true;
      showTyping();
      ws.send(JSON.stringify({ type: 'message', content: text }));
      updateSendButton();
    }

    function updateSendButton() {
      sendBtn.disabled = isTyping || !connected;
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => {
      input.rows = 1;
      input.rows = Math.min(5, Math.ceil(input.scrollHeight / 24));
    });

    connect();
    updateSendButton();
  </script>
</body>
</html>
